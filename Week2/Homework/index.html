<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가계부</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- 헤더 영역 -->
    <header class="header">
      <div class="header__left">
        <span class="header__icon" id="refreshBtn">🌸</span>
      </div>
      <div class="header__center">해니의 가계부</div>
      <div class="header__right">SOPT 38th WEB</div>
    </header>

    <!-- 필터링 영역 -->
    <div class="container">
      <section class="card" id="filterSection">
        <h2 class="filter__title">검색 필터</h2>
        <div class="filter__grid">
          <div class="filter__item">
            <label class="filter__label">제목</label>
            <input
              class="filter__input"
              id="filterTitle"
              placeholder="내역을 입력하세요"
            />
          </div>

          <div class="filter__item">
            <label class="filter__label">유형</label>
            <select class="filter__input" id="filterType">
              <option value="전체">전체</option>
              <option value="수입">수입</option>
              <option value="지출">지출</option>
            </select>
          </div>
          <div class="filter__item">
            <label class="filter__label">카테고리</label>
            <select class="filter__input" id="filterCategory">
              <option value="전체">전체</option>
              <option value="식비">식비</option>
              <option value="교통">교통</option>
              <option value="문화">문화</option>
              <option value="생활">생활</option>
              <option value="월급">월급</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="filter__item">
            <label class="filter__label">결제수단</label>
            <select class="filter__input" id="filterPayment">
              <option value="전체">전체</option>
              <option value="현금">현금</option>
              <option value="신용카드">신용카드</option>
              <option value="체크카드">체크카드</option>
              <option value="기타">기타</option>
            </select>
          </div>

          <button class="filter__btn filter__btn--apply" id="applyFilterBtn">
            적용
          </button>
          <button class="filter__btn filter__btn--reset" id="resetFilterBtn">
            초기화
          </button>
        </div>
      </section>
    </div>

    <!-- 표 영역 -->
    <div class="container">
      <section class="card" id="tableSection">
        <div class="table__top">
          <div class="table__top-left">
            <select class="table__sort" id="sortSelect">
              <option value="desc">날짜 내림차순</option>
              <option value="asc">날짜 오름차순</option>
            </select>
          </div>
          <div class="table__top-right">
            <button
              class="table__btn table__btn--delete"
              id="deleteSelectedBtn"
            >
              선택 삭제
            </button>
            <button class="table__btn table__btn--add" id="addBtn">추가</button>
          </div>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th><input type="checkbox" id="checkAll" /></th>
              <th>제목</th>
              <th>금액</th>
              <th>날짜</th>
              <th>카테고리</th>
              <th>결제수단</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
          <tfoot id="tableFoot"></tfoot>
        </table>
      </section>
    </div>

    <!-- 추가 모달 영역 -->
    <div class="modal-backdrop" id="addModalBackdrop">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">내역 추가</h2>
          <button class="modal__close" id="addModalClose">✕</button>
        </div>

        <div class="modal__body">
          <div class="modal__field">
            <label class="modal__label">제목</label>
            <input
              class="modal__input"
              id="addTitle"
              placeholder="제목을 입력하세요"
            />
          </div>

          <div class="modal__row">
            <div class="modal__field">
              <label class="modal__label">유형</label>
              <select class="modal__input" id="addType">
                <option value="지출">지출 (-)</option>
                <option value="수입">수입 (+)</option>
              </select>
            </div>
            <div class="modal__field">
              <label class="modal__label">금액 (숫자만)</label>
              <input
                class="modal__input"
                id="addAmount"
                type="number"
                min="0"
                placeholder="금액을 입력하세요"
              />
            </div>
          </div>

          <div class="modal__field">
            <label class="modal__label">날짜</label>
            <input class="modal__input" id="addDate" type="date" />
          </div>

          <div class="modal__row">
            <div class="modal__field">
              <label class="modal__label">카테고리</label>
              <select class="modal__input" id="addCategory">
                <option value="">선택</option>
                <option value="식비">식비</option>
                <option value="교통">교통</option>
                <option value="문화">문화</option>
                <option value="생활">생활</option>
                <option value="월급">월급</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div class="modal__field">
              <label class="modal__label">결제수단</label>
              <select class="modal__input" id="addPayment">
                <option value="">선택</option>
                <option value="현금">현금</option>
                <option value="신용카드">신용카드</option>
                <option value="체크카드">체크카드</option>
                <option value="기타">기타</option>
              </select>
            </div>
          </div>

          <button class="modal__submit" id="addConfirmBtn">추가</button>
        </div>
      </div>
    </div>

    <!-- 세부 정보 모달 영역 -->
    <div class="modal-backdrop" id="detailModalBackdrop">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">항목 상세</h2>
          <button class="modal__close" id="detailModalClose">✕</button>
        </div>
        <div class="modal__body" id="detailModalBody"></div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
